<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BCSBatighor — Knowledge Graph Visualizer</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+Bengali:wght@300;400;500;600;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg-primary: #0a0e1a;
    --bg-secondary: #111827;
    --bg-card: #1a1f35;
    --bg-card-hover: #222845;
    --border: #2a3050;
    --text-primary: #e8ecf4;
    --text-secondary: #8892aa;
    --text-muted: #5a6478;
    --accent-topic: #6366f1;
    --accent-fact: #10b981;
    --accent-entity: #f59e0b;
    --accent-source: #ec4899;
    --accent-about: #818cf8;
    --accent-supported: #34d399;
    --accent-object: #fbbf24;
    --accent-subtopic: #a78bfa;
    --accent-subject: #fb923c;
    --glow-topic: rgba(99, 102, 241, 0.3);
    --glow-fact: rgba(16, 185, 129, 0.3);
    --glow-entity: rgba(245, 158, 11, 0.3);
  }

  body {
    font-family: 'Inter', 'Noto Sans Bengali', sans-serif;
    background: var(--bg-primary);
    color: var(--text-primary);
    overflow: hidden;
    height: 100vh;
  }

  /* ── Header ─────────────────────────────── */
  .header {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    height: 56px;
    background: linear-gradient(135deg, rgba(17,24,39,0.95), rgba(26,31,53,0.95));
    backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 20px;
    z-index: 1000;
  }
  .header-title {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 16px;
    font-weight: 600;
    letter-spacing: -0.3px;
  }
  .header-title .emoji { font-size: 22px; }
  .header-title span { color: var(--text-secondary); font-weight: 400; font-size: 13px; }
  .header-stats {
    display: flex;
    gap: 16px;
    font-size: 12px;
    color: var(--text-secondary);
  }
  .header-stats .stat-val { color: var(--text-primary); font-weight: 600; margin-right: 3px; }

  /* ── Sidebar ────────────────────────────── */
  .sidebar {
    position: fixed;
    top: 56px;
    left: 0;
    width: 300px;
    bottom: 0;
    background: var(--bg-secondary);
    border-right: 1px solid var(--border);
    overflow-y: auto;
    z-index: 900;
    display: flex;
    flex-direction: column;
  }
  .sidebar::-webkit-scrollbar { width: 4px; }
  .sidebar::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .sidebar-section {
    padding: 14px 16px;
    border-bottom: 1px solid var(--border);
  }
  .sidebar-section h3 {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--text-muted);
    margin-bottom: 10px;
    font-weight: 600;
  }

  /* Search */
  .search-box {
    width: 100%;
    padding: 8px 12px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text-primary);
    font-size: 13px;
    font-family: inherit;
    outline: none;
    transition: border-color 0.2s;
  }
  .search-box:focus { border-color: var(--accent-topic); }
  .search-box::placeholder { color: var(--text-muted); }

  /* Filters */
  .filter-group { display: flex; flex-wrap: wrap; gap: 6px; }
  .filter-chip {
    padding: 5px 10px;
    border-radius: 6px;
    font-size: 11px;
    font-weight: 500;
    cursor: pointer;
    border: 1px solid var(--border);
    background: var(--bg-card);
    color: var(--text-secondary);
    transition: all 0.2s;
    user-select: none;
  }
  .filter-chip:hover { background: var(--bg-card-hover); }
  .filter-chip.active { border-color: currentColor; }
  .filter-chip.active[data-type="TOPIC"]  { color: var(--accent-topic);  background: rgba(99,102,241,0.12); }
  .filter-chip.active[data-type="FACT"]   { color: var(--accent-fact);   background: rgba(16,185,129,0.12); }
  .filter-chip.active[data-type="ENTITY"] { color: var(--accent-entity); background: rgba(245,158,11,0.12); }
  .filter-chip.active[data-type="SOURCE"] { color: var(--accent-source); background: rgba(236,72,153,0.12); }

  /* Topic list */
  .topic-list { display: flex; flex-direction: column; gap: 2px; }
  .topic-item {
    padding: 7px 10px;
    border-radius: 6px;
    font-size: 12px;
    cursor: pointer;
    display: flex;
    justify-content: space-between;
    align-items: center;
    transition: background 0.15s;
    color: var(--text-secondary);
  }
  .topic-item:hover { background: var(--bg-card); color: var(--text-primary); }
  .topic-item.active { background: rgba(99,102,241,0.15); color: var(--accent-topic); }
  .topic-item .count {
    font-size: 10px;
    background: var(--bg-card);
    padding: 2px 6px;
    border-radius: 4px;
    color: var(--text-muted);
    min-width: 24px;
    text-align: center;
  }
  .topic-item.active .count { background: rgba(99,102,241,0.2); color: var(--accent-topic); }

  /* Legend */
  .legend-items { display: flex; flex-direction: column; gap: 6px; }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 11px;
    color: var(--text-secondary);
  }
  .legend-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .legend-line {
    width: 20px;
    height: 2px;
    flex-shrink: 0;
    border-radius: 1px;
  }

  /* ── Canvas area ─────────────────────── */
  .canvas-area {
    position: fixed;
    top: 56px;
    left: 300px;
    right: 0;
    bottom: 0;
  }
  canvas#graphCanvas {
    width: 100%;
    height: 100%;
    display: block;
    cursor: grab;
  }
  canvas#graphCanvas:active { cursor: grabbing; }

  /* ── Node detail panel ───────────────── */
  .detail-panel {
    position: fixed;
    top: 56px;
    right: 0;
    width: 340px;
    bottom: 0;
    background: linear-gradient(180deg, var(--bg-secondary), var(--bg-primary));
    border-left: 1px solid var(--border);
    z-index: 800;
    overflow-y: auto;
    transform: translateX(100%);
    transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    padding: 20px;
  }
  .detail-panel.open { transform: translateX(0); }
  .detail-panel::-webkit-scrollbar { width: 4px; }
  .detail-panel::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .detail-close {
    position: absolute;
    top: 12px;
    right: 12px;
    width: 28px;
    height: 28px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--bg-card);
    color: var(--text-secondary);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    transition: all 0.15s;
  }
  .detail-close:hover { background: var(--bg-card-hover); color: var(--text-primary); }

  .detail-badge {
    display: inline-block;
    padding: 3px 10px;
    border-radius: 4px;
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 10px;
  }
  .detail-badge.TOPIC  { background: rgba(99,102,241,0.2);  color: var(--accent-topic); }
  .detail-badge.FACT   { background: rgba(16,185,129,0.2);  color: var(--accent-fact); }
  .detail-badge.ENTITY { background: rgba(245,158,11,0.2);  color: var(--accent-entity); }
  .detail-badge.SOURCE { background: rgba(236,72,153,0.2);  color: var(--accent-source); }

  .detail-title {
    font-size: 15px;
    font-weight: 600;
    line-height: 1.5;
    margin-bottom: 16px;
    color: var(--text-primary);
  }

  .detail-props { display: flex; flex-direction: column; gap: 8px; }
  .detail-prop {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    padding: 6px 0;
    border-bottom: 1px solid rgba(42,48,80,0.5);
  }
  .detail-prop .key { color: var(--text-muted); }
  .detail-prop .val { color: var(--text-primary); text-align: right; max-width: 180px; word-break: break-word; }

  .detail-connections {
    margin-top: 16px;
  }
  .detail-connections h4 {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--text-muted);
    margin-bottom: 8px;
  }
  .conn-item {
    padding: 6px 8px;
    font-size: 11px;
    border-radius: 4px;
    margin-bottom: 3px;
    background: var(--bg-card);
    color: var(--text-secondary);
    cursor: pointer;
    transition: background 0.15s;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .conn-item:hover { background: var(--bg-card-hover); color: var(--text-primary); }
  .conn-rel {
    font-size: 9px;
    padding: 2px 5px;
    border-radius: 3px;
    background: rgba(99,102,241,0.15);
    color: var(--accent-topic);
    font-weight: 500;
  }

  /* ── Loading ────────────────────────── */
  .loading {
    position: fixed;
    inset: 0;
    background: var(--bg-primary);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 9999;
    transition: opacity 0.5s;
  }
  .loading.hidden { opacity: 0; pointer-events: none; }
  .loading-spinner {
    width: 40px; height: 40px;
    border: 3px solid var(--border);
    border-top-color: var(--accent-topic);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  .loading p { margin-top: 16px; color: var(--text-secondary); font-size: 13px; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Tooltip ────────────────────────── */
  .tooltip {
    position: fixed;
    padding: 8px 12px;
    background: rgba(17,24,39,0.95);
    backdrop-filter: blur(8px);
    border: 1px solid var(--border);
    border-radius: 8px;
    font-size: 12px;
    color: var(--text-primary);
    pointer-events: none;
    z-index: 2000;
    max-width: 280px;
    line-height: 1.4;
    opacity: 0;
    transition: opacity 0.15s;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  }
  .tooltip.visible { opacity: 1; }

  /* ── Controls overlay ──────────────── */
  .controls {
    position: fixed;
    bottom: 16px;
    left: 316px;
    display: flex;
    gap: 6px;
    z-index: 500;
  }
  .ctrl-btn {
    width: 36px;
    height: 36px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: rgba(17,24,39,0.9);
    backdrop-filter: blur(8px);
    color: var(--text-secondary);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    transition: all 0.15s;
  }
  .ctrl-btn:hover { background: var(--bg-card-hover); color: var(--text-primary); }
</style>
</head>
<body>

<!-- Loading -->
<div class="loading" id="loading">
  <div class="loading-spinner"></div>
  <p>Loading Knowledge Graph...</p>
</div>

<!-- Tooltip -->
<div class="tooltip" id="tooltip"></div>

<!-- Header -->
<div class="header">
  <div class="header-title">
    <span class="emoji">🏮</span>
    BCSBatighor Knowledge Graph
    <span>Interactive Visualizer</span>
  </div>
  <div class="header-stats" id="headerStats"></div>
</div>

<!-- Sidebar -->
<div class="sidebar">
  <div class="sidebar-section">
    <h3>Search</h3>
    <input type="text" class="search-box" id="searchBox" placeholder="Search nodes... (Bangla / English)">
  </div>

  <div class="sidebar-section">
    <h3>Node Types</h3>
    <div class="filter-group" id="filterGroup"></div>
  </div>

  <div class="sidebar-section">
    <h3>Topics</h3>
    <div class="topic-list" id="topicList"></div>
  </div>

  <div class="sidebar-section">
    <h3>Legend — Nodes</h3>
    <div class="legend-items">
      <div class="legend-item"><div class="legend-dot" style="background:var(--accent-topic)"></div>Topic</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--accent-fact)"></div>Fact</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--accent-entity)"></div>Entity</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--accent-source)"></div>Source</div>
    </div>
  </div>
  <div class="sidebar-section">
    <h3>Legend — Edges</h3>
    <div class="legend-items">
      <div class="legend-item"><div class="legend-line" style="background:var(--accent-about)"></div>ABOUT</div>
      <div class="legend-item"><div class="legend-line" style="background:var(--accent-supported)"></div>SUPPORTED_BY</div>
      <div class="legend-item"><div class="legend-line" style="background:var(--accent-object)"></div>OBJECT_IS</div>
      <div class="legend-item"><div class="legend-line" style="background:var(--accent-subtopic)"></div>HAS_SUBTOPIC</div>
      <div class="legend-item"><div class="legend-line" style="background:var(--accent-subject)"></div>SUBJECT_OF</div>
    </div>
  </div>
</div>

<!-- Canvas -->
<div class="canvas-area">
  <canvas id="graphCanvas"></canvas>
</div>

<!-- Controls -->
<div class="controls">
  <button class="ctrl-btn" id="zoomIn" title="Zoom In">+</button>
  <button class="ctrl-btn" id="zoomOut" title="Zoom Out">−</button>
  <button class="ctrl-btn" id="resetView" title="Reset View">⟳</button>
  <button class="ctrl-btn" id="toggleLabels" title="Toggle Labels">Aa</button>
</div>

<!-- Detail Panel -->
<div class="detail-panel" id="detailPanel">
  <button class="detail-close" id="detailClose">×</button>
  <div id="detailContent"></div>
</div>

<script src="kg_graph_data.js"></script>
<script>
// ── Globals ─────────────────────────────────────────────────────
let graphData = { nodes: [], edges: [] };
let nodeMap = {};
let nodePositions = {};
let visibleNodes = new Set();
let visibleEdges = [];

// View transform
let viewX = 0, viewY = 0, viewScale = 1;
let isDragging = false, dragStartX = 0, dragStartY = 0;
let draggedNode = null, dragOffsetX = 0, dragOffsetY = 0;

// Filters
let activeTypes = new Set(['TOPIC', 'FACT', 'ENTITY', 'SOURCE']);
let activeTopic = null;
let searchQuery = '';
let showLabels = true;
let hoveredNode = null;
let selectedNode = null;

// Colors
const TYPE_COLORS = {
  TOPIC:  '#6366f1', FACT:    '#10b981',
  ENTITY: '#f59e0b', SOURCE:  '#ec4899',
  UNKNOWN:'#6b7280'
};
const TYPE_SIZES = { TOPIC: 10, FACT: 5, ENTITY: 4, SOURCE: 8, UNKNOWN: 4 };
const EDGE_COLORS = {
  ABOUT: '#818cf8', SUPPORTED_BY: '#34d399', OBJECT_IS: '#fbbf24',
  HAS_SUBTOPIC: '#a78bfa', SUBJECT_OF: '#fb923c', RELATED: '#475569'
};

// Canvas
const canvas = document.getElementById('graphCanvas');
const ctx = canvas.getContext('2d');

// ── Load Data ───────────────────────────────────────────────────
async function loadData() {
  try {
    if (typeof kgGraphData !== 'undefined') {
      graphData = kgGraphData;
    } else {
      const resp = await fetch('kg_graph_data.json');
      graphData = await resp.json();
    }
  } catch (e) {
    console.error('Failed to load graph data:', e);
    document.getElementById('loading').innerHTML =
      '<p style="color:#ef4444">Failed to load knowledge graph data. Make sure it exists alongside this HTML file.</p>';
    return;
  }

  // Build node map
  graphData.nodes.forEach(n => { nodeMap[n.id] = n; });

  // Layout
  computeLayout();
  buildUI();

  // Hide loading
  document.getElementById('loading').classList.add('hidden');
  setTimeout(() => document.getElementById('loading').style.display = 'none', 500);

  // Start render loop
  resizeCanvas();
  requestAnimationFrame(renderLoop);
}

// ── Force-directed Layout ───────────────────────────────────────
function computeLayout() {
  const positions = {};

  // Build topic clusters for seeding
  const topicNodes = graphData.nodes.filter(n => n.type === 'TOPIC');
  const topicAngleMap = {};
  const topicIdByName = {};

  // Only parent topics (those with facts)
  const factsByTopicName = {};
  graphData.nodes.filter(n => n.type === 'FACT').forEach(f => {
    const t = f.topic || '';
    if (t) factsByTopicName[t] = (factsByTopicName[t] || 0) + 1;
  });
  const parentTopicNodes = topicNodes.filter(t => factsByTopicName[t.label] > 0);
  parentTopicNodes.forEach((t, i) => {
    const angle = (2 * Math.PI * i) / Math.max(parentTopicNodes.length, 1);
    topicAngleMap[t.id] = angle;
    topicIdByName[t.label] = t.id;
    positions[t.id] = { x: Math.cos(angle) * 1400, y: Math.sin(angle) * 1400, vx: 0, vy: 0 };
  });

  // Place subtopic nodes near their parent
  topicNodes.forEach(t => {
    if (positions[t.id]) return;
    // Find parent via HAS_SUBTOPIC edge
    let parentAngle = Math.random() * 2 * Math.PI;
    for (const e of graphData.edges) {
      if (e.target === t.id && e.relation === 'HAS_SUBTOPIC' && topicAngleMap[e.source] != null) {
        parentAngle = topicAngleMap[e.source] + (Math.random() - 0.5) * 0.4;
        break;
      }
    }
    positions[t.id] = {
      x: Math.cos(parentAngle) * 1100 + (Math.random() - 0.5) * 200,
      y: Math.sin(parentAngle) * 1100 + (Math.random() - 0.5) * 200,
      vx: 0, vy: 0
    };
  });

  // Place FACT/ENTITY/SOURCE nodes near their topic cluster
  graphData.nodes.forEach(n => {
    if (positions[n.id]) return;
    let angle = Math.random() * 2 * Math.PI;

    // FACT: use topic field
    if (n.type === 'FACT' && n.topic && topicIdByName[n.topic]) {
      const tid = topicIdByName[n.topic];
      angle = topicAngleMap[tid] + (Math.random() - 0.5) * 0.6;
    } else {
      // ENTITY: find connected fact's topic
      for (const e of graphData.edges) {
        const other = (e.source === n.id) ? e.target : (e.target === n.id ? e.source : null);
        if (other && nodeMap[other]?.type === 'FACT' && nodeMap[other]?.topic && topicIdByName[nodeMap[other].topic]) {
          angle = topicAngleMap[topicIdByName[nodeMap[other].topic]] + (Math.random() - 0.5) * 0.8;
          break;
        }
        if (other && nodeMap[other]?.type === 'TOPIC' && topicAngleMap[other] != null) {
          angle = topicAngleMap[other] + (Math.random() - 0.5) * 0.5;
          break;
        }
      }
    }

    const radius = 400 + Math.random() * 1200;
    positions[n.id] = {
      x: Math.cos(angle) * radius + (Math.random() - 0.5) * 150,
      y: Math.sin(angle) * radius + (Math.random() - 0.5) * 150,
      vx: 0, vy: 0
    };
  });

  // ── Force simulation with velocity clamping ──
  const ITERATIONS = 150;
  const MAX_VELOCITY = 30;
  const nodeIds = Object.keys(positions);
  const N = nodeIds.length;

  for (let iter = 0; iter < ITERATIONS; iter++) {
    const alpha = Math.max(0.01, 1 - iter / ITERATIONS);

    // Repulsion - O(N^2) is fine for ~1000 nodes and prevents clustering
    for (let i = 0; i < N; i++) {
      const pa = positions[nodeIds[i]];
      for (let j = i + 1; j < N; j++) {
        const pb = positions[nodeIds[j]];
        const dx = pa.x - pb.x || (Math.random() - 0.5);
        const dy = pa.y - pb.y || (Math.random() - 0.5);
        const distSq = dx * dx + dy * dy + 1;
        const f = 2500 * alpha / distSq;
        const dist = Math.sqrt(distSq);
        const fx = (dx / dist) * f;
        const fy = (dy / dist) * f;
        pa.vx += fx; pa.vy += fy;
        pb.vx -= fx; pb.vy -= fy;
      }
    }

    // Attraction along edges
    for (const e of graphData.edges) {
      const pa = positions[e.source];
      const pb = positions[e.target];
      if (!pa || !pb) continue;
      const dx = pb.x - pa.x;
      const dy = pb.y - pa.y;
      const dist = Math.sqrt(dx * dx + dy * dy) + 1;
      // Stronger pull for ABOUT/SUBTOPIC, lighter for others
      const strength = (e.relation === 'ABOUT' || e.relation === 'HAS_SUBTOPIC') ? 0.002 : 0.0005;
      const f = strength * dist * alpha;
      pa.vx += dx * f; pa.vy += dy * f;
      pb.vx -= dx * f; pb.vy -= dy * f;
    }

    // Centering gravity
    for (const id of nodeIds) {
      const p = positions[id];
      p.vx -= p.x * 0.00005 * alpha;
      p.vy -= p.y * 0.00005 * alpha;
    }

    // Integrate with damping + velocity clamping
    for (const id of nodeIds) {
      const p = positions[id];
      p.vx *= 0.75;
      p.vy *= 0.75;
      // Clamp velocity
      const speed = Math.sqrt(p.vx * p.vx + p.vy * p.vy);
      if (speed > MAX_VELOCITY) { p.vx *= MAX_VELOCITY / speed; p.vy *= MAX_VELOCITY / speed; }
      // NaN protection
      if (!isFinite(p.vx)) p.vx = 0;
      if (!isFinite(p.vy)) p.vy = 0;
      p.x += p.vx;
      p.y += p.vy;
      // Bound positions
      if (!isFinite(p.x)) p.x = (Math.random() - 0.5) * 2000;
      if (!isFinite(p.y)) p.y = (Math.random() - 0.5) * 2000;
    }
  }

  nodePositions = positions;
}

// ── Build UI ────────────────────────────────────────────────────
let uiBuilt = false;
function buildUI() {
  if (uiBuilt) return;
  uiBuilt = true;

  // Header stats
  const typeCounts = {};
  graphData.nodes.forEach(n => { typeCounts[n.type] = (typeCounts[n.type] || 0) + 1; });
  document.getElementById('headerStats').innerHTML =
    `<div><span class="stat-val">${graphData.nodes.length}</span>Nodes</div>` +
    `<div><span class="stat-val">${graphData.edges.length}</span>Edges</div>` +
    `<div><span class="stat-val">${typeCounts.TOPIC || 0}</span>Topics</div>` +
    `<div><span class="stat-val">${typeCounts.FACT || 0}</span>Facts</div>`;

  // Filter chips — clear first
  const filterGroup = document.getElementById('filterGroup');
  filterGroup.innerHTML = '';
  ['TOPIC', 'FACT', 'ENTITY', 'SOURCE'].forEach(type => {
    const chip = document.createElement('div');
    chip.className = 'filter-chip active';
    chip.dataset.type = type;
    chip.textContent = `${type} (${typeCounts[type] || 0})`;
    chip.onclick = () => {
      if (activeTypes.has(type)) { activeTypes.delete(type); chip.classList.remove('active'); }
      else { activeTypes.add(type); chip.classList.add('active'); }
      updateVisibility();
    };
    filterGroup.appendChild(chip);
  });

  // Topic list
  const topicList = document.getElementById('topicList');
  topicList.innerHTML = '';
  const topics = graphData.nodes.filter(n => n.type === 'TOPIC');
  // Count facts per topic
  const factsByTopic = {};
  graphData.nodes.filter(n => n.type === 'FACT').forEach(f => {
    const t = f.topic || 'Unknown';
    factsByTopic[t] = (factsByTopic[t] || 0) + 1;
  });
  // Sort: parent topics first (ones with facts), then subtopics
  const parentTopics = topics.filter(t => factsByTopic[t.label] > 0)
    .sort((a, b) => (factsByTopic[b.label] || 0) - (factsByTopic[a.label] || 0));
  parentTopics.forEach(t => {
    const item = document.createElement('div');
    item.className = 'topic-item';
    item.innerHTML = `<span>${t.label}</span><span class="count">${factsByTopic[t.label] || 0}</span>`;
    item.onclick = () => {
      if (activeTopic === t.label) {
        activeTopic = null;
        item.classList.remove('active');
      } else {
        document.querySelectorAll('.topic-item').forEach(el => el.classList.remove('active'));
        activeTopic = t.label;
        item.classList.add('active');
        // Center on this topic
        const p = nodePositions[t.id];
        if (p) { viewX = -p.x * viewScale + canvas.width / 2; viewY = -p.y * viewScale + canvas.height / 2; }
      }
      updateVisibility();
    };
    topicList.appendChild(item);
  });

  // Search
  document.getElementById('searchBox').oninput = (e) => {
    searchQuery = e.target.value.toLowerCase();
    updateVisibility();
  };

  updateVisibility();
}

// ── Visibility Filter ──────────────────────────────────────────
function updateVisibility() {
  visibleNodes.clear();
  visibleEdges = [];

  graphData.nodes.forEach(n => {
    if (!activeTypes.has(n.type)) return;
    if (activeTopic && n.type === 'FACT' && n.topic !== activeTopic) return;
    if (searchQuery) {
      const txt = (n.label + (n.topic || '') + (n.subtopic || '') + (n.subtype || '')).toLowerCase();
      if (!txt.includes(searchQuery)) return;
    }
    visibleNodes.add(n.id);
  });

  // If filtering by topic, also show connected entities/topics
  if (activeTopic) {
    graphData.edges.forEach(e => {
      if (visibleNodes.has(e.source) && nodeMap[e.target]) visibleNodes.add(e.target);
      if (visibleNodes.has(e.target) && nodeMap[e.source]) visibleNodes.add(e.source);
    });
  }

  graphData.edges.forEach(e => {
    if (visibleNodes.has(e.source) && visibleNodes.has(e.target)) {
      visibleEdges.push(e);
    }
  });
}

// ── Canvas Rendering ───────────────────────────────────────────
function resizeCanvas() {
  const rect = canvas.parentElement.getBoundingClientRect();
  canvas.width = rect.width * window.devicePixelRatio;
  canvas.height = rect.height * window.devicePixelRatio;
  canvas.style.width = rect.width + 'px';
  canvas.style.height = rect.height + 'px';
  ctx.setTransform(window.devicePixelRatio, 0, 0, window.devicePixelRatio, 0, 0);
}
window.addEventListener('resize', resizeCanvas);

function renderLoop() {
  render();
  requestAnimationFrame(renderLoop);
}

function render() {
  const w = canvas.width / window.devicePixelRatio;
  const h = canvas.height / window.devicePixelRatio;
  ctx.clearRect(0, 0, w, h);

  ctx.save();
  ctx.translate(viewX, viewY);
  ctx.scale(viewScale, viewScale);

  // Draw edges
  ctx.lineWidth = 0.5 / viewScale;
  for (const e of visibleEdges) {
    const pa = nodePositions[e.source];
    const pb = nodePositions[e.target];
    if (!pa || !pb) continue;

    const col = EDGE_COLORS[e.relation] || EDGE_COLORS.RELATED;
    ctx.strokeStyle = col + '50'; // semi-transparent
    if (hoveredNode && (e.source === hoveredNode || e.target === hoveredNode)) {
      ctx.strokeStyle = col + 'cc';
      ctx.lineWidth = 1.5 / viewScale;
    }
    if (selectedNode && (e.source === selectedNode || e.target === selectedNode)) {
      ctx.strokeStyle = col + 'ff';
      ctx.lineWidth = 2 / viewScale;
    }

    ctx.beginPath();
    ctx.moveTo(pa.x, pa.y);
    ctx.lineTo(pb.x, pb.y);
    ctx.stroke();
    ctx.lineWidth = 0.5 / viewScale;
  }

  // Draw nodes
  const labelThreshold = 0.6;
  for (const nid of visibleNodes) {
    const n = nodeMap[nid];
    const p = nodePositions[nid];
    if (!n || !p) continue;

    const color = TYPE_COLORS[n.type] || TYPE_COLORS.UNKNOWN;
    let radius = TYPE_SIZES[n.type] || 4;

    // Highlight
    const isHovered = hoveredNode === nid;
    const isSelected = selectedNode === nid;
    const isConnectedToHovered = hoveredNode && visibleEdges.some(e =>
      (e.source === hoveredNode && e.target === nid) ||
      (e.target === hoveredNode && e.source === nid)
    );
    const isConnectedToSelected = selectedNode && visibleEdges.some(e =>
      (e.source === selectedNode && e.target === nid) ||
      (e.target === selectedNode && e.source === nid)
    );

    if (isHovered || isSelected) radius *= 1.6;
    else if (isConnectedToHovered || isConnectedToSelected) radius *= 1.2;
    else if (hoveredNode || selectedNode) {
      ctx.globalAlpha = 0.2;
    }

    // Glow
    if (isHovered || isSelected) {
      ctx.beginPath();
      ctx.arc(p.x, p.y, radius * 3, 0, Math.PI * 2);
      const glow = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, radius * 3);
      glow.addColorStop(0, color + '40');
      glow.addColorStop(1, color + '00');
      ctx.fillStyle = glow;
      ctx.fill();
    }

    // Node circle
    ctx.beginPath();
    ctx.arc(p.x, p.y, radius, 0, Math.PI * 2);
    ctx.fillStyle = color;
    ctx.fill();

    // Border for hovered/selected
    if (isHovered || isSelected) {
      ctx.strokeStyle = '#ffffff';
      ctx.lineWidth = 1.5 / viewScale;
      ctx.stroke();
    }

    ctx.globalAlpha = 1;

    // Labels (only at sufficient zoom for non-topic nodes)
    if (showLabels && (n.type === 'TOPIC' || viewScale > labelThreshold)) {
      if (n.type === 'TOPIC' || isHovered || isSelected || isConnectedToHovered || isConnectedToSelected) {
        const fontSize = Math.max(8, Math.min(13, 11 / viewScale));
        ctx.font = `${n.type === 'TOPIC' ? '600' : '400'} ${fontSize}px 'Noto Sans Bengali', 'Inter', sans-serif`;
        ctx.fillStyle = isHovered || isSelected ? '#ffffff' : (n.type === 'TOPIC' ? '#c7c9f0' : '#8892aa');
        ctx.textAlign = 'center';
        ctx.textBaseline = 'top';
        const label = n.label.length > 30 ? n.label.slice(0, 28) + '…' : n.label;
        ctx.fillText(label, p.x, p.y + radius + 4);
      }
    }
  }

  ctx.restore();
}

// ── Interaction ────────────────────────────────────────────────
function screenToWorld(sx, sy) {
  return { x: (sx - viewX) / viewScale, y: (sy - viewY) / viewScale };
}

function findNodeAt(wx, wy) {
  let closest = null, closestDist = Infinity;
  for (const nid of visibleNodes) {
    const p = nodePositions[nid];
    if (!p) continue;
    const r = TYPE_SIZES[nodeMap[nid]?.type] || 4;
    const dist = Math.sqrt((p.x - wx) ** 2 + (p.y - wy) ** 2);
    if (dist < r * 2.5 && dist < closestDist) { closest = nid; closestDist = dist; }
  }
  return closest;
}

canvas.addEventListener('mousedown', (e) => {
  const rect = canvas.getBoundingClientRect();
  const sx = e.clientX - rect.left;
  const sy = e.clientY - rect.top;
  const world = screenToWorld(sx, sy);
  const node = findNodeAt(world.x, world.y);

  if (node) {
    draggedNode = node;
    dragOffsetX = nodePositions[node].x - world.x;
    dragOffsetY = nodePositions[node].y - world.y;
  } else {
    isDragging = true;
    dragStartX = e.clientX - viewX;
    dragStartY = e.clientY - viewY;
  }
});

canvas.addEventListener('mousemove', (e) => {
  const rect = canvas.getBoundingClientRect();
  const sx = e.clientX - rect.left;
  const sy = e.clientY - rect.top;

  if (isDragging) {
    viewX = e.clientX - dragStartX;
    viewY = e.clientY - dragStartY;
    return;
  }

  if (draggedNode) {
    const world = screenToWorld(sx, sy);
    nodePositions[draggedNode].x = world.x + dragOffsetX;
    nodePositions[draggedNode].y = world.y + dragOffsetY;
    return;
  }

  // Hover detection
  const world = screenToWorld(sx, sy);
  const node = findNodeAt(world.x, world.y);
  hoveredNode = node;
  canvas.style.cursor = node ? 'pointer' : 'grab';

  // Tooltip
  const tooltip = document.getElementById('tooltip');
  if (node) {
    const n = nodeMap[node];
    let html = `<strong>${n.type}</strong><br>${n.label}`;
    if (n.topic) html += `<br><small style="color:#8892aa">Topic: ${n.topic}</small>`;
    if (n.subtopic) html += `<br><small style="color:#8892aa">Subtopic: ${n.subtopic}</small>`;
    if (n.subtype) html += `<br><small style="color:#8892aa">Type: ${n.subtype}</small>`;
    tooltip.innerHTML = html;
    tooltip.style.left = (e.clientX + 14) + 'px';
    tooltip.style.top = (e.clientY + 14) + 'px';
    tooltip.classList.add('visible');
  } else {
    tooltip.classList.remove('visible');
  }
});

canvas.addEventListener('mouseup', (e) => {
  if (draggedNode && !isDragging) {
    // If barely moved, treat as click
    selectNode(draggedNode);
  }
  isDragging = false;
  draggedNode = null;
});

canvas.addEventListener('mouseleave', () => {
  hoveredNode = null;
  document.getElementById('tooltip').classList.remove('visible');
});

canvas.addEventListener('wheel', (e) => {
  e.preventDefault();
  const rect = canvas.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;

  const zoomFactor = e.deltaY < 0 ? 1.12 : 1 / 1.12;
  const newScale = Math.max(0.05, Math.min(8, viewScale * zoomFactor));

  viewX = mx - (mx - viewX) * (newScale / viewScale);
  viewY = my - (my - viewY) * (newScale / viewScale);
  viewScale = newScale;
}, { passive: false });

// ── Detail Panel ────────────────────────────────────────────────
function selectNode(nid) {
  selectedNode = nid;
  const n = nodeMap[nid];
  if (!n) return;

  const panel = document.getElementById('detailPanel');
  const content = document.getElementById('detailContent');

  let html = `<div class="detail-badge ${n.type}">${n.type}</div>`;
  html += `<div class="detail-title">${n.label}</div>`;
  html += `<div class="detail-props">`;
  html += `<div class="detail-prop"><span class="key">ID</span><span class="val">${n.id}</span></div>`;

  if (n.type === 'FACT') {
    if (n.topic) html += `<div class="detail-prop"><span class="key">Topic</span><span class="val">${n.topic}</span></div>`;
    if (n.subtopic) html += `<div class="detail-prop"><span class="key">Subtopic</span><span class="val">${n.subtopic}</span></div>`;
    if (n.difficulty) html += `<div class="detail-prop"><span class="key">Difficulty</span><span class="val">${n.difficulty}</span></div>`;
    if (n.question_type) html += `<div class="detail-prop"><span class="key">Question Type</span><span class="val">${n.question_type}</span></div>`;
    if (n.composite_score) html += `<div class="detail-prop"><span class="key">Quality Score</span><span class="val">${n.composite_score}</span></div>`;
    if (n.bcs_exam) html += `<div class="detail-prop"><span class="key">BCS Exam</span><span class="val">${n.bcs_exam}</span></div>`;
  }
  if (n.type === 'ENTITY' && n.subtype) {
    html += `<div class="detail-prop"><span class="key">Subtype</span><span class="val">${n.subtype}</span></div>`;
  }
  html += `</div>`;

  // Connections
  const connections = [];
  graphData.edges.forEach(e => {
    if (e.source === nid) connections.push({ id: e.target, rel: e.relation, dir: '→' });
    if (e.target === nid) connections.push({ id: e.source, rel: e.relation, dir: '←' });
  });

  if (connections.length > 0) {
    html += `<div class="detail-connections">`;
    html += `<h4>Connections (${connections.length})</h4>`;
    connections.slice(0, 30).forEach(c => {
      const cn = nodeMap[c.id];
      if (!cn) return;
      const label = cn.label.length > 35 ? cn.label.slice(0, 33) + '…' : cn.label;
      html += `<div class="conn-item" onclick="selectNode('${c.id}')">${c.dir} ${label}<span class="conn-rel">${c.rel}</span></div>`;
    });
    if (connections.length > 30) {
      html += `<div style="padding:6px;font-size:11px;color:var(--text-muted)">... and ${connections.length - 30} more</div>`;
    }
    html += `</div>`;
  }

  content.innerHTML = html;
  panel.classList.add('open');
}

document.getElementById('detailClose').onclick = () => {
  document.getElementById('detailPanel').classList.remove('open');
  selectedNode = null;
};

// ── Controls ────────────────────────────────────────────────────
document.getElementById('zoomIn').onclick = () => {
  viewScale = Math.min(8, viewScale * 1.3);
};
document.getElementById('zoomOut').onclick = () => {
  viewScale = Math.max(0.05, viewScale / 1.3);
};
document.getElementById('resetView').onclick = () => {
  viewScale = 1;
  viewX = canvas.width / (2 * window.devicePixelRatio);
  viewY = canvas.height / (2 * window.devicePixelRatio);
  activeTopic = null;
  searchQuery = '';
  document.getElementById('searchBox').value = '';
  document.querySelectorAll('.topic-item').forEach(el => el.classList.remove('active'));
  activeTypes = new Set(['TOPIC', 'FACT', 'ENTITY', 'SOURCE']);
  document.querySelectorAll('.filter-chip').forEach(el => el.classList.add('active'));
  updateVisibility();
};
document.getElementById('toggleLabels').onclick = () => {
  showLabels = !showLabels;
};

// ── Init ────────────────────────────────────────────────────────
function initView() {
  resizeCanvas();
  const w = canvas.width / window.devicePixelRatio;
  const h = canvas.height / window.devicePixelRatio;
  viewX = w / 2;
  viewY = h / 2;
  viewScale = 0.15;
}

initView();
loadData();
</script>
</body>
</html>
